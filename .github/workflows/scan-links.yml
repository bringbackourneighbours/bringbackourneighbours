name: Scan external links for errors

on:
  schedule:
    - cron: 0 8 * * *
  workflow_dispatch:

jobs:
  scan:
    name: Check for broken links
    runs-on: ubuntu-latest
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
      - name: Run scan script
        run: ./scripts/scan-links.sh
